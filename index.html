<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRIO GELADO — Gelado Gourmet</title>
  <meta name="description" content="Peça seus gelados gourmet online. Monte seu pedido e finalize pelo WhatsApp." />
  <meta property="og:title" content="TRIO GELADO — Gelado Gourmet" />
  <meta property="og:description" content="Catálogo digital de gelados gourmet. Peça agora!" />
  <meta name="theme-color" content="#889DDC" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style-v2.css" />
</head>
<body>

  <!-- HEADER: logo + filtros de categoria -->
  <header class="header">
    <div class="header__brand">
      <div class="header__brand-text">
        <span class="header__logo">TRIO GELADO <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="none" stroke="#ef4444" stroke-width="60"><path d="m480-120-58-52q-101-91-167-157T150-447.5Q111-500 95.5-544T80-634q0-94 63-157t157-63q52 0 99 22t81 62q34-40 81-62t99-22q94 0 157 63t63 157q0 46-15.5 90T810-447.5Q771-395 705-329T538-172l-58 52Z"/></svg></span>
        <span class="header__sub">Gelado Gourmet</span>
      </div>
      <img src="logo/logo-1.jpeg" class="header__logo-img" alt="Trio Gelado Logo" />
    </div>
    <div class="header__filters" id="filters"></div>
  </header>

  <!-- GRID DE PRODUTOS (preenchido pelo JS) -->
  <main class="main">
    <div class="product-grid" id="product-grid"></div>
  </main>

  <!-- BOTÃO FLUTUANTE DO CARRINHO -->
  <button class="cart-btn" id="cart-btn" style="display:none" aria-label="Ver carrinho"></button>

  <!-- OVERLAY (fecha bottom sheet ao clicar fora) -->
  <div class="overlay" id="overlay"></div>

  <!-- BOTTOM SHEET -->
  <div class="bottom-sheet" id="bottom-sheet" aria-modal="true" role="dialog">
    <div class="bottom-sheet__handle"></div>
    <h2 class="bottom-sheet__title">🛒 Seu pedido</h2>

    <div class="cart-items" id="cart-items"></div>
    <p class="cart-total" id="cart-total"></p>

    <div class="delivery-toggle">
      <button class="delivery-toggle__btn active" id="btn-delivery">📍 Entrega</button>
      <button class="delivery-toggle__btn" id="btn-pickup">🏪 Retirada</button>
    </div>

    <textarea
      class="address-input"
      id="address-input"
      placeholder="Rua, número, bairro..."
      rows="3"
      aria-label="Endereço de entrega"
    ></textarea>

    <p class="pickup-msg" id="pickup-msg" style="display:none">
      Combinamos o local de retirada no WhatsApp.
    </p>

    <p class="section-label">Pagamento</p>
    <div class="delivery-toggle">
      <button class="delivery-toggle__btn active" id="btn-pix">Pix</button>
      <button class="delivery-toggle__btn" id="btn-card">Cartão</button>
      <button class="delivery-toggle__btn" id="btn-cash">Dinheiro</button>
    </div>

    <button class="whatsapp-btn" id="whatsapp-btn">
      <svg viewBox="0 0 40 40" height="24" width="24" preserveAspectRatio="xMidYMid meet" fill="none"><rect width="40" height="40" fill="#25D366" rx="2"></rect><path fill="white" fill-rule="evenodd" d="M7.16 19.89a12.88 12.88 0 0 1 22-9.07 12.72 12.72 0 0 1 3.78 9.08 12.88 12.88 0 0 1-18.9 11.34l-6.46 1.69a.42.42 0 0 1-.5-.52l1.72-6.26a12.76 12.76 0 0 1-1.64-6.26Zm12.89 10.55c-1.89 0-3.73-.5-5.34-1.46l-.39-.22-3.96 1.03 1.06-3.85-.25-.4A10.37 10.37 0 0 1 9.57 20a10.47 10.47 0 0 1 17.9-7.38A10.34 10.34 0 0 1 30.52 20c0 5.76-4.7 10.44-10.48 10.44Zm3.53-8.94a52.15 52.15 0 0 1 2.31 1.1c.22.12.37.19.43.3.08.13.08.76-.18 1.5-.26.73-1.51 1.4-2.12 1.5-.54.08-1.22.11-1.97-.13a17.9 17.9 0 0 1-1.79-.66c-2.93-1.28-4.92-4.15-5.3-4.7l-.05-.07c-.17-.23-1.28-1.72-1.28-3.27 0-1.45.71-2.21 1.04-2.57l.06-.06c.29-.32.63-.4.83-.4a12.4 12.4 0 0 1 .68.01c.18 0 .4 0 .63.55l.35.84c.27.66.56 1.4.62 1.5.07.16.13.34.02.55l-.04.1a1.8 1.8 0 0 1-.27.43 12.6 12.6 0 0 0-.47.55c-.16.16-.32.33-.14.65a9.5 9.5 0 0 0 1.74 2.19 8.08 8.08 0 0 0 2.52 1.56c.32.16.5.13.68-.08.19-.2.79-.92 1-1.23.2-.32.41-.27.7-.16Z" clip-rule="evenodd"></path></svg>
      <span id="whatsapp-btn-label">Confirmar via WhatsApp</span>
    </button>
  </div>

  <script src="script.js"></script>
</body>
</html>
